name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtbase qtsql'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt dependencies
        run: |
          cd build
          windeployqt deadliner.exe --release --no-translations

      - name: Install NSIS
        run: |
          choco install nsis -y
          
      - name: Create NSIS Installer
        run: |
          cd build
          Copy-Item -Recurse -Force ../packaging/windows/installer.nsi .
          Copy-Item -Force ../LICENSE .
          Copy-Item -Force ../README.md .
          makensis installer.nsi
          
      - name: Package Windows ZIP (portable)
        run: |
          mkdir deadliner-windows-portable
          cp build/deadliner.exe deadliner-windows-portable/
          cp -r build/*.dll deadliner-windows-portable/ 2>$null || true
          cp LICENSE deadliner-windows-portable/
          cp README.md deadliner-windows-portable/
          Compress-Archive -Path deadliner-windows-portable -DestinationPath deadliner-windows-x64-portable.zip

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: deadliner-windows-installer
          path: build/deadliner-installer.exe
          
      - name: Upload Windows Portable
        uses: actions/upload-artifact@v4
        with:
          name: deadliner-windows-portable
          path: deadliner-windows-x64-portable.zip

  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git cmake ninja qt6-base sqlite

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with CMake
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Create PKGBUILD package
        run: |
          cd packaging/linux
          makepkg --noconfirm -sf
          mv *.pkg.tar.zst ../../

      - name: Upload Arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: deadliner-arch-x64
          path: '*.pkg.tar.zst'

  create-release:
    needs: [build-windows, build-arch]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            deadliner-windows-installer/deadliner-installer.exe
            deadliner-windows-portable/deadliner-windows-x64-portable.zip
            deadliner-arch-x64/*.pkg.tar.zst
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
