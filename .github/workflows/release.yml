name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtbase qtsql'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt dependencies
        run: |
          cd build
          windeployqt deadliner.exe --release --no-translations
          
      - name: Package Windows
        run: |
          mkdir deadliner-windows
          cp build/deadliner.exe deadliner-windows/
          cp -r build/*.dll deadliner-windows/ 2>$null || true
          cp LICENSE deadliner-windows/
          cp README.md deadliner-windows/
          Compress-Archive -Path deadliner-windows -DestinationPath deadliner-windows-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: deadliner-windows-x64
          path: deadliner-windows-x64.zip

  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git cmake ninja qt6-base sqlite

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with CMake
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Create PKGBUILD package
        run: |
          cd packaging/linux
          makepkg --noconfirm -sf
          mv *.pkg.tar.zst ../../

      - name: Upload Arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: deadliner-arch-x64
          path: '*.pkg.tar.zst'

  create-release:
    needs: [build-windows, build-arch]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            deadliner-windows-x64/deadliner-windows-x64.zip
            deadliner-arch-x64/*.pkg.tar.zst
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
